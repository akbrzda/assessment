name: CI Checks

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "admin-frontend/**"
      - "bot/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "admin-frontend/**"
      - "bot/**"
      - ".github/workflows/ci.yml"

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check backend entrypoints
        working-directory: backend
        run: |
          node --check src/server.js
          node --check src/app.js

      - name: Run auth-related tests
        working-directory: backend
        run: node --test tests/auth/max-auth.test.js tests/auth/verify-init-data-platform.test.js

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  admin-frontend-build:
    name: Admin Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install admin frontend dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Build admin frontend
        working-directory: admin-frontend
        run: npm run build

  bot-check:
    name: Bot Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install bot dependencies
        working-directory: bot
        run: npm ci

      - name: Syntax check bot
        working-directory: bot
        run: node --check src/index.js
