name: Deploy Admin

on:
  push:
    branches:
      - main
    paths:
      - "admin-frontend/**"
      - ".github/workflows/deploy-admin.yml"

jobs:
  deploy:
    name: Deploy Admin Panel to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Create .env file
        working-directory: admin-frontend
        run: |
          cat << EOF > .env
          API_BASE_URL=${{ secrets.ADMIN_API_BASE_URL }}
          INVITE_EXPIRATION_DAYS=${{ secrets.ADMIN_INVITE_EXPIRATION_DAYS }}
          BOT_USERNAME=${{ secrets.ADMIN_BOT_USERNAME }}
          EOF

      - name: Build application
        working-directory: admin-frontend
        run: npm run build

      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "ERROR: SSH_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "ERROR: SSH_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "SSH setup completed successfully"

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            admin-frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/admin.theorica.ru/

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ls -la /var/www/admin.theorica.ru
            echo "Deployment completed successfully"

      - name: Configure nginx cache headers for index.html
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # index.html не должен кешироваться браузером — иначе после деплоя
            # браузер запрашивает старые JS-чанки, которых уже нет, и получает 404.
            SNIPPET="/etc/nginx/snippets/admin-no-cache.conf"
            mkdir -p /etc/nginx/snippets
            cat > "$SNIPPET" << 'NGINX_EOF'
            location = /index.html {
              add_header Cache-Control "no-cache, must-revalidate" always;
              add_header Pragma "no-cache" always;
              add_header Expires "0" always;
            }
            NGINX_EOF

            # Добавляем include в конфиг сайта, если его ещё нет
            SITE_CONF=$(grep -rl "admin.theorica.ru\|/var/www/admin.theorica.ru" /etc/nginx/sites-enabled/ 2>/dev/null | head -1)
            if [ -n "$SITE_CONF" ] && ! grep -q "admin-no-cache.conf" "$SITE_CONF"; then
              sed -i "/server_name\|root \/var\/www\/admin/a\\    include /etc/nginx/snippets/admin-no-cache.conf;" "$SITE_CONF"
            fi

            nginx -t && systemctl reload nginx
            echo "Nginx cache headers configured"
