<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Система аттестации</title>
    
    <!-- Подключение Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- CSS переменные для темы Telegram -->
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f1f1f1;
            --tg-theme-header-bg-color: #ffffff;
            --tg-theme-accent-text-color: #2481cc;
            --tg-theme-section-bg-color: #ffffff;
            --tg-theme-section-header-text-color: #6d6d71;
            --tg-theme-subtitle-text-color: #999999;
            --tg-theme-destructive-text-color: #ff3b30;
        }
        
        /* Сброс стилей и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            line-height: 1.4;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #app {
            min-height: 100vh;
            width: 100%;
        }
        
        /* Поддержка темной темы */
        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #212121;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #aaaaaa;
                --tg-theme-link-color: #8774e1;
                --tg-theme-button-color: #8774e1;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #0f0f0f;
                --tg-theme-header-bg-color: #212121;
                --tg-theme-accent-text-color: #8774e1;
                --tg-theme-section-bg-color: #212121;
                --tg-theme-section-header-text-color: #aaaaaa;
                --tg-theme-subtitle-text-color: #aaaaaa;
                --tg-theme-destructive-text-color: #ff453a;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
